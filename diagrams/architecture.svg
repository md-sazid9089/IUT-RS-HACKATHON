<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <style>
      .box    { fill:#ffffff; stroke:#334155; stroke-width:1.5; rx:8; ry:8; }
      .accent { fill:#eff6ff; stroke:#2563eb; stroke-width:1.5; rx:8; ry:8; }
      .alt    { fill:#fef3c7; stroke:#b45309; stroke-width:1.5; rx:8; ry:8; }
      .grp    { fill:#f8fafc; stroke:#94a3b8; stroke-dasharray:5,3; stroke-width:1.2; rx:12; ry:12; }
      .title  { font-weight:700; font-size:14px; fill:#0f172a; }
      .lbl    { fill:#0f172a; }
      .sub    { fill:#475569; font-size:11px; }
      .edge   { stroke:#334155; stroke-width:1.4; fill:none; }
      .edgelbl{ fill:#334155; font-size:11px; }
    </style>
  </defs>

  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
    Office Power Monitor — System Architecture
  </text>
  <text x="500" y="46" text-anchor="middle" class="sub">
    Single backend (source of truth) shared by Web Dashboard and Discord Bot
  </text>

  <!-- Simulated device layer -->
  <rect x="30" y="80" width="220" height="120" class="grp"/>
  <text x="140" y="102" text-anchor="middle" class="title">Simulated Device Layer</text>
  <rect x="50" y="115" width="180" height="70" class="accent"/>
  <text x="140" y="140" text-anchor="middle" class="lbl">15 devices</text>
  <text x="140" y="158" text-anchor="middle" class="sub">3 rooms · 2 fans (60W) + 3 lights (15W) each</text>
  <text x="140" y="174" text-anchor="middle" class="sub">Simulator ticks every 5 s</text>

  <!-- Backend group -->
  <rect x="290" y="80" width="440" height="480" class="grp"/>
  <text x="510" y="102" text-anchor="middle" class="title">Backend  (Node.js · Express · Socket.IO · :4000)</text>

  <rect x="310" y="120" width="180" height="60" class="box"/>
  <text x="400" y="145" text-anchor="middle" class="lbl">Simulator</text>
  <text x="400" y="162" text-anchor="middle" class="sub">tick 5s · state transitions</text>

  <rect x="530" y="120" width="180" height="60" class="accent"/>
  <text x="620" y="145" text-anchor="middle" class="lbl">DeviceStore  (source of truth)</text>
  <text x="620" y="162" text-anchor="middle" class="sub">EventEmitter · in-memory</text>

  <rect x="310" y="210" width="180" height="60" class="box"/>
  <text x="400" y="235" text-anchor="middle" class="lbl">EnergyStore</text>
  <text x="400" y="252" text-anchor="middle" class="sub">rolling W · kWh today</text>

  <rect x="530" y="210" width="180" height="60" class="box"/>
  <text x="620" y="235" text-anchor="middle" class="lbl">AlertEngine  (every 10s)</text>
  <text x="620" y="252" text-anchor="middle" class="sub">after-hours · &gt;2h continuous</text>

  <rect x="310" y="300" width="180" height="60" class="box"/>
  <text x="400" y="325" text-anchor="middle" class="lbl">AlertStore</text>

  <rect x="530" y="300" width="180" height="60" class="box"/>
  <text x="620" y="325" text-anchor="middle" class="lbl">IncidentAggregator</text>
  <text x="620" y="342" text-anchor="middle" class="sub">dedup · groups related alerts</text>

  <rect x="310" y="390" width="180" height="60" class="box"/>
  <text x="400" y="415" text-anchor="middle" class="lbl">REST API  (/api/*)</text>
  <text x="400" y="432" text-anchor="middle" class="sub">devices · rooms · usage · alerts</text>

  <rect x="530" y="390" width="180" height="60" class="accent"/>
  <text x="620" y="415" text-anchor="middle" class="lbl">SocketBroadcaster</text>
  <text x="620" y="432" text-anchor="middle" class="sub">devices/rooms/usage/alerts events</text>

  <rect x="310" y="480" width="400" height="60" class="alt"/>
  <text x="510" y="505" text-anchor="middle" class="lbl">HuggingFace Inference API  (optional AI insights)</text>
  <text x="510" y="522" text-anchor="middle" class="sub">called by AlertEngine to explain anomalies</text>

  <!-- Consumers -->
  <rect x="770" y="120" width="210" height="200" class="grp"/>
  <text x="875" y="142" text-anchor="middle" class="title">Web Dashboard</text>
  <rect x="785" y="155" width="180" height="150" class="accent"/>
  <text x="875" y="180" text-anchor="middle" class="lbl">React + Vite  (:5173)</text>
  <text x="875" y="200" text-anchor="middle" class="sub">Office floor plan (SVG)</text>
  <text x="875" y="218" text-anchor="middle" class="sub">Live device panel</text>
  <text x="875" y="236" text-anchor="middle" class="sub">Power meter (total + per-room)</text>
  <text x="875" y="254" text-anchor="middle" class="sub">Alerts panel (timestamped)</text>
  <text x="875" y="278" text-anchor="middle" class="sub">Socket.IO — no polling</text>

  <rect x="770" y="360" width="210" height="200" class="grp"/>
  <text x="875" y="382" text-anchor="middle" class="title">Discord Bot</text>
  <rect x="785" y="395" width="180" height="150" class="accent"/>
  <text x="875" y="420" text-anchor="middle" class="lbl">discord.js + socket.io-client</text>
  <text x="875" y="440" text-anchor="middle" class="sub">!status  !room &lt;name&gt;</text>
  <text x="875" y="458" text-anchor="middle" class="sub">!usage  !alerts  !ask</text>
  <text x="875" y="478" text-anchor="middle" class="sub">LLM-polished replies</text>
  <text x="875" y="498" text-anchor="middle" class="sub">Proactive channel alerts</text>
  <text x="875" y="522" text-anchor="middle" class="sub">Same backend as dashboard</text>

  <!-- Edges: Simulator → DeviceStore -->
  <path class="edge" d="M250 150 L 310 150" marker-end="url(#arrow)"/>
  <path class="edge" d="M490 150 L 530 150" marker-end="url(#arrow)"/>

  <!-- DeviceStore → EnergyStore / AlertEngine -->
  <path class="edge" d="M620 180 C 620 195, 400 195, 400 210" marker-end="url(#arrow)"/>
  <path class="edge" d="M620 180 L 620 210" marker-end="url(#arrow)"/>

  <!-- AlertEngine → AlertStore → IncidentAggregator -->
  <path class="edge" d="M620 270 C 620 285, 400 285, 400 300" marker-end="url(#arrow)"/>
  <path class="edge" d="M490 330 L 530 330" marker-end="url(#arrow)"/>

  <!-- Stores → REST API + SocketBroadcaster -->
  <path class="edge" d="M400 360 L 400 390" marker-end="url(#arrow)"/>
  <path class="edge" d="M620 360 L 620 390" marker-end="url(#arrow)"/>
  <path class="edge" d="M400 360 C 500 375, 500 380, 530 400" marker-end="url(#arrow)"/>

  <!-- AlertEngine → HuggingFace -->
  <path class="edge" d="M620 270 C 700 300, 700 460, 710 480" marker-end="url(#arrow)"/>

  <!-- SocketBroadcaster → Dashboard + Bot -->
  <path class="edge" d="M710 420 C 750 400, 760 250, 785 240" marker-end="url(#arrow)"/>
  <text x="740" y="330" class="edgelbl">Socket.IO</text>
  <path class="edge" d="M710 420 C 750 440, 760 460, 785 470" marker-end="url(#arrow)"/>

  <!-- REST fallback for Bot -->
  <path class="edge" d="M490 420 C 720 500, 770 500, 785 490" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="620" y="565" class="edgelbl">REST fallback → Bot</text>

  <!-- User -->
  <rect x="30" y="480" width="220" height="80" class="grp"/>
  <text x="140" y="502" text-anchor="middle" class="title">Users</text>
  <text x="140" y="524" text-anchor="middle" class="sub">Boss + team → browser tab</text>
  <text x="140" y="542" text-anchor="middle" class="sub">Boss + team → Discord app</text>

  <path class="edge" d="M250 510 C 500 620, 770 560, 785 520" marker-end="url(#arrow)" stroke-dasharray="2,3"/>
</svg>
